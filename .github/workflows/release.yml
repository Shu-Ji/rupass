name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-musl
            binary_name: rupass
            asset_stem: rupass-linux-x64
            asset_ext: .bin
            build_mode: native
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: rupass.exe
            asset_stem: rupass-windows-x64
            asset_ext: .exe
            build_mode: native
          - runner: windows-latest
            target: i686-pc-windows-msvc
            binary_name: rupass.exe
            asset_stem: rupass-windows-x86
            asset_ext: .exe
            build_mode: native
          - runner: windows-latest
            target: aarch64-pc-windows-msvc
            binary_name: rupass.exe
            asset_stem: rupass-windows-arm64
            asset_ext: .exe
            build_mode: native
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            binary_name: rupass
            asset_stem: rupass-macos-x64
            asset_ext: .bin
            build_mode: native
          - runner: macos-15
            target: aarch64-apple-darwin
            binary_name: rupass
            asset_stem: rupass-macos-arm64
            asset_ext: .bin
            build_mode: native
          - runner: ubuntu-latest
            target: aarch64-unknown-linux-musl
            binary_name: rupass
            asset_stem: rupass-linux-arm64
            asset_ext: .bin
            build_mode: cross
          - runner: ubuntu-latest
            target: armv7-unknown-linux-musleabihf
            binary_name: rupass
            asset_stem: rupass-linux-armv7
            asset_ext: .bin
            build_mode: cross

    steps:
      - uses: actions/checkout@v5

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          if [ "${GITHUB_REF_TYPE:-}" = "tag" ] && [ -n "${GITHUB_REF_NAME:-}" ]; then
            version="${GITHUB_REF_NAME}"
          else
            version="v$(sed -n 's/^version = "\(.*\)"$/\1/p' Cargo.toml | head -n 1)"
          fi
          echo "value=${version}" >> "$GITHUB_OUTPUT"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build release binary
        if: matrix.build_mode == 'native'
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Build cross release binary
        if: matrix.build_mode == 'cross'
        uses: houseabsolute/actions-rust-cross@v1
        with:
          command: build
          target: ${{ matrix.target }}
          args: --release --locked
          strip: true

      - name: Stage artifact
        shell: bash
        run: |
          rm -rf dist
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "dist/${{ matrix.asset_stem }}-${{ steps.version.outputs.value }}${{ matrix.asset_ext }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.asset_stem }}-${{ steps.version.outputs.value }}${{ matrix.asset_ext }}
          path: dist/${{ matrix.asset_stem }}-${{ steps.version.outputs.value }}${{ matrix.asset_ext }}

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: rupass-*
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          cd dist
          sha256sum * > SHA256SUMS

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
